<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M3U8视频下载器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    
    .header {
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 0 0 20px 20px;
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .container {
      padding: 15px;
    }
    
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      margin-bottom: 15px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-size: 13px;
      color: #a0aec0;
    }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: linear-gradient(180deg, #667eea, #764ba2);
      border-radius: 2px;
    }
    
    .video-list {
      max-height: 280px;
      overflow-y: auto;
    }
    
    .video-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }
    
    .video-item:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(102, 126, 234, 0.5);
    }
    
    .video-url {
      font-size: 11px;
      color: #a0aec0;
      word-break: break-all;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    
    .video-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #718096;
      margin-bottom: 10px;
    }
    
    .video-source {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      width: 100%;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .progress-container {
      display: none;
      margin-top: 10px;
    }
    
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    
    .progress-text {
      font-size: 11px;
      color: #a0aec0;
      margin-top: 5px;
      text-align: center;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #718096;
    }
    
    .empty-state svg {
      width: 60px;
      height: 60px;
      margin-bottom: 15px;
      opacity: 0.5;
    }
    
    .empty-state p {
      font-size: 14px;
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    
    .actions .btn {
      flex: 1;
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 500;
    }
    
    /* 滚动条样式 */
    .video-list::-webkit-scrollbar {
      width: 6px;
    }
    
    .video-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
    }
    
    .video-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }
    
    .footer {
      padding: 15px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 10px;
    }
    
    .footer a {
      color: #667eea;
      text-decoration: none;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 M3U8视频下载器</h1>
    <p>自动检测 · 一键下载 · MP4格式</p>
  </div>
  
  <div class="container">
    <div class="status-bar">
      <div class="status-dot"></div>
      <div class="status-text" id="statusText">正在监控页面...</div>
    </div>
    
    <div class="section-title">检测到的视频</div>
    
    <div class="video-list" id="videoList">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <p>暂未检测到M3U8资源</p>
        <p style="font-size: 12px; margin-top: 5px;">请打开包含视频的网页</p>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <a href="https://github.com/corbancl/m3u8-video-downloader" target="_blank">GitHub</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
